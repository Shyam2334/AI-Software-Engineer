version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiswe
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiswe_secret}
      POSTGRES_DB: aiswe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiswe"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aiswe:${POSTGRES_PASSWORD:-aiswe_secret}@postgres:5432/aiswe
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - projects_data:/projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_worker.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://aiswe:${POSTGRES_PASSWORD:-aiswe_secret}@postgres:5432/aiswe
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - projects_data:/projects
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  projects_data:
